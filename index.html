<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b6bcb" />

    <!-- Site-wide defaults. Per-page title, description, canonical, robots and
         OG/Twitter title/description are injected by <Seo> (react-helmet). -->
    <meta
      name="keywords"
      content="hydration tracker, hydration tracking device, water intake tracker, smart water bottle tracker, automatic hydration tracker, water tracking device, daily water tracker app, sip tracker, drink water reminder device"
    />
    <meta name="author" content="Sponge Hydration" />

    <!-- Open Graph (site-wide defaults; per-page title/description/url via Seo) -->
    <meta property="og:type" content="product" />
    <meta property="og:site_name" content="Sponge Hydration" />
    <meta property="og:image" content="https://www.spongehydration.com/og-image.jpg" />
    <meta property="og:image:alt" content="A water bottle on the Sponge hydration tracker, status light glowing green." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.spongehydration.com/og-image.jpg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Structured data: Product -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Sponge Hydration Tracker",
        "image": "https://www.spongehydration.com/media/products/single.jpg",
        "description": "Sponge is a smart, clip-on hydration tracking device that works with any water bottle. It automatically tracks your water intake, syncs to a free iOS and Android app, and can lock distracting apps until you reach your daily hydration goal.",
        "brand": { "@type": "Brand", "name": "Sponge" },
        "category": "Hydration Tracking Device",
        "offers": {
          "@type": "Offer",
          "url": "https://www.spongehydration.com/",
          "priceCurrency": "USD",
          "price": "59.99",
          "availability": "https://schema.org/PreOrder"
        }
      }
    </script>

    <!-- Structured data: FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is a hydration tracker and how does Sponge work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A hydration tracker measures how much water you drink during the day. Sponge is a small clip-on hydration tracking device that snaps magnetically onto any water bottle. On-device sensors record each sip automatically and sync to the free Sponge app, so you never have to log water by hand."
            }
          },
          {
            "@type": "Question",
            "name": "Does the Sponge hydration tracking device work with any water bottle?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Sponge is designed to clip onto the bottle you already own, insulated steel bottles, plastic tumblers, glass bottles and more. There is no special bottle to buy."
            }
          },
          {
            "@type": "Question",
            "name": "How long does the battery last?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sponge lasts about 8 days on a single charge and recharges over USB-C in a couple of hours."
            }
          },
          {
            "@type": "Question",
            "name": "Can the hydration tracker lock apps until I drink water?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. The Sponge app can lock the apps you choose until you reach your daily hydration goal, turning your phone into a gentle nudge to drink more water."
            }
          },
          {
            "@type": "Question",
            "name": "How much does Sponge cost?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sponge is available to pre-order for $59.99 with a 30-day money-back guarantee. The companion app is free on iOS and Android."
            }
          }
        ]
      }
    </script>

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Sponge Hydration",
        "url": "https://www.spongehydration.com/",
        "logo": "https://www.spongehydration.com/icon-512.png",
        "sameAs": []
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
